<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="一級建築士">
<meta name="theme-color" content="#0f172a">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏗</text></svg>">
<title>一級建築士 進捗管理</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <h1>🚀 IKKYU MISSION CONTROL</h1>
    <div class="countdown">
      <span class="cd-label">試験まで あと</span>
      <span id="days-left" class="cd-num">--</span>
      <span class="cd-label">日</span>
    </div>
    <div class="cd-sub">
      <span id="exam-date">2026-07-26</span> 学科試験
    </div>

    <div class="overall">
      <div class="overall-bar">
        <div class="bar-fill" id="overall-fill"></div>
        <div class="bar-marker bar-marker-min" title="最低4周ライン"></div>
        <div class="bar-marker bar-marker-target" title="目標6周ライン"></div>
      </div>
      <div class="overall-stats">
        <span id="overall-pct">0%</span>
        <span class="dim">/</span>
        <span>全体進捗（6周=100%）</span>
      </div>
      <div class="pace">
        <span>🎯 残り <strong id="pace-target">--</strong> 単元・周</span>
        <span class="pace-divider">|</span>
        <span>1日 <strong id="pace-per-day">--</strong> 単元・周</span>
      </div>
    </div>
  </header>

  <nav class="tabs" id="tabs"></nav>

  <main id="subject-view"></main>

  <section class="daily-log">
    <h2>📝 今日の記録</h2>
    <div class="log-form">
      <label>解いた問題数 <input type="number" id="log-problems" min="0" placeholder="60"></label>
      <label>正答数 <input type="number" id="log-correct" min="0" placeholder="42"></label>
      <label>気分
        <select id="log-mood">
          <option value="5">★★★★★</option>
          <option value="4">★★★★☆</option>
          <option value="3" selected>★★★☆☆</option>
          <option value="2">★★☆☆☆</option>
          <option value="1">★☆☆☆☆</option>
        </select>
      </label>
      <button id="log-save">保存</button>
    </div>
    <div class="log-history" id="log-history"></div>
  </section>

  <footer>
    <button id="export-btn">📦 エクスポート</button>
    <button id="import-btn">📥 インポート</button>
    <input type="file" id="import-file" accept="application/json" hidden>
    <button id="reset-btn" class="danger">🗑 リセット</button>
  </footer>

  <!-- 瞑想 起動ボタン -->
  <button id="meditate-fab" aria-label="5分瞑想を開始">🧘</button>

  <!-- 瞑想モーダル -->
  <div id="meditate-modal" class="meditate-modal" hidden>
    <div class="meditate-content">
      <button id="meditate-close" class="meditate-close" aria-label="閉じる">×</button>
      <div class="meditate-title">5 MIN MEDITATION</div>

      <div class="breathing-container">
        <div class="breathing-circle"></div>
        <div class="breathing-text" id="breathing-text">準備</div>
      </div>

      <div class="meditate-timer" id="meditate-timer">5:00</div>

      <div class="meditate-options">
        <div class="opt-row">
          <span class="opt-label">🎵 音楽</span>
          <select id="music-select" class="opt-select">
            <option value="cosmic">🌌 Cosmic Pad</option>
            <option value="bowls">🔔 Tibetan Bowls</option>
            <option value="ocean">🌊 Ocean Drift</option>
            <option value="binaural">〰️ Binaural Calm</option>
            <option value="rain">🌧 Soft Rain</option>
            <option value="off">🔇 なし</option>
          </select>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggle-voice" checked>
          <span class="toggle-label">🔊 ガイド音声</span>
        </label>
      </div>

      <button id="meditate-start" class="meditate-start">START</button>
      <button id="meditate-stop" class="meditate-stop" hidden>STOP</button>

      <div class="meditate-hint">音は最初の操作で許可されます。iPhoneは消音モードを解除してください</div>
    </div>
  </div>

  <script src="app.js?v=8"></script>
</body>
</html>
